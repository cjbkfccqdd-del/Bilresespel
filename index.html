function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

  return{background:color,border:"none",borderRadius:12,padding:"12px 24px",color:"#fff",fontFamily:theme.font,

// ===== HÄNGA GUBBE =====
const hangmanWords=["JÄRRESTAD","SIMRISHAMN","SKÅNE","BILEN","SEMESTERN","GLASS","STRANDEN","SOMMAR","FAMILJEN","LEKPLATS","VIKING","KRABBA","FISKEBÅT","SOLNEDGÅNG","KLIPPORNA","VÄGSKYLTEN","RASTPLATS","BENSINMACK","TRAFIKLJUS","MOTORVÄGEN"];
const HSTAGES=[
`  +---+\n  |   |\n      |\n      |\n      |\n      |\n=========`,
`  +---+\n  |   |\n  O   |\n      |\n      |\n      |\n=========`,
`  +---+\n  |   |\n  O   |\n  |   |\n      |\n      |\n=========`,
`  +---+\n  |   |\n  O   |\n /|   |\n      |\n      |\n=========`,
`  +---+\n  |   |\n  O   |\n /|\\  |\n      |\n      |\n=========`,
`  +---+\n  |   |\n  O   |\n /|\\  |\n /    |\n      |\n=========`,
`  +---+\n  |   |\n  O   |\n /|\\  |\n / \\  |\n      |\n=========`,
];
function HangmanGame({onScore}){
  const [word,setWord]=useState(()=>shuffle(hangmanWords)[0]);
  const [guessed,setGuessed]=useState([]);
  const [wrong,setWrong]=useState(0);
  const [won,setWon]=useState(false);
  const [lost,setLost]=useState(false);
  const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZÅÄÖ".split("");
  const displayWord=word.split("").map(l=>guessed.includes(l)?l:"_").join(" ");
  const remaining=wrong<6&&!won;
  function guess(l){
    if(guessed.includes(l)||!remaining)return;
    const ng=[...guessed,l];setGuessed(ng);
    if(!word.includes(l)){const nw=wrong+1;setWrong(nw);if(nw>=6)setLost(true);}
    else if(word.split("").every(c=>ng.includes(c))){setWon(true);onScore(6-wrong);}
  }
  function reset(){setWord(shuffle(hangmanWords)[0]);setGuessed([]);setWrong(0);setWon(false);setLost(false);}
  return(
    <div>
      <pre style={{fontFamily:"monospace",color:wrong>=6?theme.accent:theme.text,background:"#0d1117",borderRadius:12,padding:16,fontSize:14,lineHeight:1.4,textAlign:"center"}}>{HSTAGES[wrong]}</pre>
      <div style={{textAlign:"center",margin:"16px 0"}}>
        <div style={{fontFamily:"monospace",fontSize:28,letterSpacing:8,color:won?theme.green:theme.text}}>{displayWord}</div>
        <div style={{color:theme.muted,fontSize:13,marginTop:8}}>{wrong}/6 felgissningar</div>
      </div>
      {(won||lost)?(
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:36}}>{won?"🎉":"💀"}</div>
          <div style={{color:won?theme.green:theme.accent,fontFamily:theme.font,fontSize:20}}>{won?`Rätt! +${6-wrong} poäng`:`Ordet var: ${word}`}</div>
          <button onClick={reset} style={btnStyle(theme.blue)}>Nytt ord</button>
        </div>
      ):(
        <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"}}>
          {letters.map(l=>(
            <button key={l} onClick={()=>guess(l)} disabled={guessed.includes(l)} style={{
              width:38,height:38,borderRadius:8,border:`2px solid ${guessed.includes(l)?"#333":theme.accent}`,
              background:guessed.includes(l)?(word.includes(l)?theme.green+"33":"#333"):theme.accent+"22",
              color:guessed.includes(l)?theme.muted:theme.text,fontFamily:theme.font,fontSize:14,cursor:guessed.includes(l)?"default":"pointer",
            }}>{l}</button>
          ))}
        </div>
      )}
    </div>
  );
}

// ===== TRE I RAD =====
function TicTacToeGame({onScore}){
  const [board,setBoard]=useState(Array(9).fill(null));
  const [xIsNext,setXIsNext]=useState(true);
  const [scored,setScored]=useState(false);
  function calcWinner(b){
    const lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for(const[a,c,d]of lines)if(b[a]&&b[a]===b[c]&&b[a]===b[d])return{winner:b[a],line:[a,c,d]};
    return null;
  }
  const result=calcWinner(board);const draw=!result&&board.every(Boolean);
  function click(i){
    if(board[i]||result)return;
    const nb=[...board];nb[i]=xIsNext?"✖":"○";setBoard(nb);setXIsNext(!xIsNext);
    const r=calcWinner(nb);if(r&&!scored){onScore(3);setScored(true);}
  }
  function reset(){setBoard(Array(9).fill(null));setXIsNext(true);setScored(false);}
  const wl=result?.line||[];
  return(
    <div style={{textAlign:"center"}}>
      <div style={{color:theme.text,fontFamily:theme.font,fontSize:18,marginBottom:12}}>{result?`${result.winner} vann! 🎉`:draw?"Oavgjort! 🤝":`${xIsNext?"✖":"○"}:s tur`}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,maxWidth:240,margin:"0 auto 16px"}}>
        {board.map((cell,i)=>(
          <button key={i} onClick={()=>click(i)} style={{height:72,borderRadius:14,border:`3px solid ${wl.includes(i)?theme.gold:"#333"}`,background:wl.includes(i)?theme.gold+"22":theme.card,fontSize:32,cursor:cell||result?"default":"pointer",color:cell==="✖"?theme.accent:theme.blue}}>{cell}</button>
        ))}
      </div>
      {(result||draw)&&<button onClick={reset} style={btnStyle(theme.green)}>Spela igen</button>}
    </div>
  );
}

const quizQ=[
  {q:"Vad heter Sveriges huvudstad?",a:"Stockholm",opts:["Göteborg","Malmö","Stockholm","Uppsala"]},
  {q:"Hur många ben har en spindel?",a:"8",opts:["6","8","10","12"]},
  {q:"Vilket land är störst i världen?",a:"Ryssland",opts:["Kina","USA","Ryssland","Kanada"]},
  {q:"Vad heter havet söder om Sverige?",a:"Östersjön",opts:["Nordsjön","Atlanten","Östersjön","Medelhavet"]},
  {q:"Hur många dagar i februari skottår?",a:"29",opts:["28","29","30","31"]},
  {q:"Vilken planet är närmast solen?",a:"Merkurius",opts:["Venus","Mars","Merkurius","Jupiter"]},
  {q:"Vad är 7 × 8?",a:"56",opts:["48","54","56","64"]},
  {q:"Australiens nationalsymbol?",a:"Känguru",opts:["Koala","Känguru","Wombat","Emu"]},
  {q:"Hur lång är en fotbollsmatch?",a:"90 min",opts:["60 min","80 min","90 min","120 min"]},
  {q:"Världens längsta flod?",a:"Nilen",opts:["Amazonas","Nilen","Yangtzé","Mississippi"]},
  {q:"Hur många färger har regnbågen?",a:"7",opts:["5","6","7","8"]},
  {q:"Pippis häst heter?",a:"Lansen",opts:["Blanken","Lansen","Hästen","Gubben"]},
  {q:"Första världskrigets startår?",a:"1914",opts:["1912","1914","1916","1918"]},
  {q:"Sekunder på en minut?",a:"60",opts:["60","100","50","120"]},
  {q:"Vilket år reste man första gången till månen?",a:"1969",opts:["1965","1967","1969","1972"]},
];
function QuizGame({onScore}){
  const [qs]=useState(()=>shuffle(quizQ).slice(0,8));
  const [idx,setIdx]=useState(0);const [sel,setSel]=useState(null);
  const [pts,setPts]=useState(0);const [done,setDone]=useState(false);
  const q=qs[idx];
  function pick(opt){
    if(sel)return;setSel(opt);
    const correct=opt===q.a;const np=correct?pts+1:pts;setPts(np);
    setTimeout(()=>{if(idx+1>=qs.length){setDone(true);onScore(np);}else{setIdx(idx+1);setSel(null);}},1000);
  }
  if(done)return(<div style={{textAlign:"center"}}><div style={{fontSize:48}}>{pts>=6?"🏆":pts>=4?"😊":"📚"}</div><div style={{fontFamily:theme.font,fontSize:24,color:theme.gold}}>{pts}/{qs.length} rätt!</div></div>);
  return(
    <div>
      <div style={{color:theme.muted,fontSize:13,marginBottom:8}}>Fråga {idx+1}/{qs.length} • {pts} poäng</div>
      <div style={{background:theme.card,borderRadius:16,padding:20,fontFamily:theme.font,fontSize:20,color:theme.text,marginBottom:16,lineHeight:1.4}}>{q.q}</div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {shuffle(q.opts).map(opt=>{
          let bg=theme.card,border="#444";
          if(sel){if(opt===q.a){bg=theme.green+"44";border=theme.green;}else if(opt===sel){bg=theme.accent+"44";border=theme.accent;}}
          return(<button key={opt} onClick={()=>pick(opt)} style={{background:bg,border:`2px solid ${border}`,borderRadius:12,padding:"14px 16px",color:theme.text,fontSize:16,textAlign:"left",cursor:sel?"default":"pointer"}}>{opt}</button>);
        })}
      </div>
    </div>
  );
}

// ===== MEMORY =====
const memojis=["🚗","🏖️","🌊","🦀","⛵","🌅","🦋","🐟","🌸","🍦","🎡","🏔️"];
function MemoryGame({onScore}){
  const [state,setState]=useState(()=>{
    const pick=shuffle(memojis).slice(0,8);
    return shuffle([...pick,...pick].map((e,i)=>({id:i,emoji:e,flipped:false,matched:false})));
  });
  const [flipped,setFlipped]=useState([]);const [moves,setMoves]=useState(0);
  const [done,setDone]=useState(false);const [scored,setScored]=useState(false);
  function flip(id){
    if(flipped.length===2)return;
    const card=state.find(c=>c.id===id);if(card.flipped||card.matched)return;
    const nf=[...flipped,id];
    const ns=state.map(c=>c.id===id?{...c,flipped:true}:c);setState(ns);setFlipped(nf);
    if(nf.length===2){
      setMoves(m=>m+1);
      const[a,b]=nf.map(fid=>ns.find(c=>c.id===fid));
      if(a.emoji===b.emoji){
        const ms=ns.map(c=>nf.includes(c.id)?{...c,matched:true}:c);setState(ms);setFlipped([]);
        if(ms.every(c=>c.matched)){const p=Math.max(1,10-Math.floor(moves/2));if(!scored){onScore(p);setScored(true);}setDone(true);}
      }else{setTimeout(()=>{setState(s=>s.map(c=>nf.includes(c.id)?{...c,flipped:false}:c));setFlipped([]);},900);}
    }
  }
  return(
    <div>
      {done&&<div style={{textAlign:"center",marginBottom:16}}><div style={{fontSize:36}}>🎉</div><div style={{fontFamily:theme.font,color:theme.gold,fontSize:20}}>Klart på {moves} drag!</div></div>}
      <div style={{color:theme.muted,fontSize:13,marginBottom:12}}>Drag: {moves}</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
        {state.map(c=>(
          <button key={c.id} onClick={()=>flip(c.id)} style={{height:70,borderRadius:12,border:`2px solid ${c.matched?theme.green:c.flipped?theme.gold:"#333"}`,background:c.matched?theme.green+"22":c.flipped?theme.gold+"22":theme.card,fontSize:c.flipped||c.matched?32:20,cursor:c.matched||c.flipped?"default":"pointer"}}>{c.flipped||c.matched?c.emoji:"❓"}</button>
        ))}
      </div>
    </div>
  );
}

// ===== ORDKEDJA =====
function WordChainGame({onScore}){
  const [chain,setChain]=useState(["BIL"]);const [input,setInput]=useState("");
  const [error,setError]=useState("");const [done,setDone]=useState(false);const [pts,setPts]=useState(0);
  const last=chain[chain.length-1];const lastChar=last[last.length-1];
  function submit(){
    const w=input.trim().toUpperCase();if(!w)return;
    if(w.length<2){setError("För kort!");return;}
    if(chain.includes(w)){setError("Redan använt!");return;}
    if(w[0]!==lastChar){setError(`Måste börja på "${lastChar}"!`);return;}
    const nc=[...chain,w];const np=pts+1;setChain(nc);setPts(np);setInput("");setError("");
    if(nc.length>=12){setDone(true);onScore(np);}
  }
  return(
    <div>
      <div style={{color:theme.muted,fontSize:14,marginBottom:8}}>Nästa börjar på: <strong style={{color:theme.gold,fontSize:20}}>{lastChar}</strong> • {pts}p • {chain.length}/12</div>
      <div style={{background:theme.card,borderRadius:12,padding:12,marginBottom:14,display:"flex",flexWrap:"wrap",gap:6,minHeight:48}}>
        {chain.map((w,i)=><span key={i} style={{background:theme.accent+"33",border:`1px solid ${theme.accent}`,borderRadius:8,padding:"2px 8px",fontSize:14}}>{w}</span>)}
      </div>
      {done?(<div style={{textAlign:"center"}}><div style={{fontSize:36}}>🏆</div><div style={{fontFamily:theme.font,color:theme.gold,fontSize:22}}>Klar! {pts} poäng!</div></div>):(
        <>
          {error&&<div style={{color:theme.accent,fontSize:14,marginBottom:8}}>{error}</div>}
          <div style={{display:"flex",gap:8}}>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder={`Börjar på ${lastChar}...`}
              style={{flex:1,background:theme.card,border:"2px solid #444",borderRadius:10,padding:"10px 14px",color:theme.text,fontSize:16}}/>
            <button onClick={submit} style={btnStyle(theme.green,false)}>✓</button>
          </div>
        </>
      )}
    </div>
  );
}

// ===== RÄKNA FORDON =====
const vTargets=[{emoji:"🚛",label:"lastbil",reward:3},{emoji:"🚌",label:"buss",reward:4},{emoji:"🚕",label:"taxi",reward:5},{emoji:"🏍️",label:"motorcykel",reward:2},{emoji:"🚓",label:"polisbil",reward:6},{emoji:"🚑",label:"ambulans",reward:7},{emoji:"🚒",label:"brandbil",reward:8},{emoji:"🚐",label:"minibuss",reward:3}];
function CountingGame({onScore}){
  const [target]=useState(()=>vTargets[Math.floor(Math.random()*vTargets.length)]);
  const [count,setCount]=useState(0);const [goal]=useState(()=>3+Math.floor(Math.random()*4));const [done,setDone]=useState(false);
  function tap(){if(done)return;const nc=count+1;setCount(nc);if(nc>=goal){setDone(true);onScore(target.reward);}}
  return(
    <div style={{textAlign:"center"}}>
      <div style={{fontSize:72,margin:"16px 0"}}>{target.emoji}</div>
      <div style={{fontFamily:theme.font,fontSize:22,marginBottom:4}}>{target.label.toUpperCase()}</div>
      <div style={{color:theme.muted,fontSize:14,marginBottom:20}}>Mål: {goal} • {target.reward} poäng</div>
      <div style={{fontFamily:theme.font,fontSize:64,color:done?theme.green:theme.gold,marginBottom:20}}>{count}/{goal}</div>
      {done?(<div><div style={{fontSize:36}}>🎊</div><div style={{fontFamily:theme.font,color:theme.green,fontSize:22}}>+{target.reward} poäng!</div></div>):
        (<button onClick={tap} style={{background:theme.accent,border:"none",borderRadius:50,width:120,height:120,fontSize:48,cursor:"pointer"}}>{target.emoji}</button>)}
    </div>
  );
}

// ===== GÅTOR =====
const riddles=[
  {q:"Jag har händer men ingen kropp, ett ansikte men ingen näsa. Vad är jag?",a:"En klocka"},
  {q:"Ju mer du tar av mig, desto större blir jag. Vad är jag?",a:"Ett hål"},
  {q:"Jag flyger alltid men har aldrig vingar. Vad är jag?",a:"Tiden"},
  {q:"Vad kan gå upp men aldrig ner?",a:"Din ålder"},
  {q:"Jag har städer men inga hus. Vad är jag?",a:"En karta"},
  {q:"Vad kan du fånga men aldrig kasta?",a:"En förkylning"},
  {q:"Jag är alltid framför dig men kan aldrig ses.",a:"Framtiden"},
  {q:"Vad har en hals men ingen huvud?",a:"En flaska"},
  {q:"Vad tillhör dig men används mest av andra?",a:"Ditt namn"},
  {q:"Lätt som fjäder men ingen klarar hålla den länge. Vad är jag?",a:"Andan"},
];
function RiddleGame({onScore}){
  const [qs]=useState(()=>shuffle(riddles).slice(0,5));
  const [idx,setIdx]=useState(0);const [revealed,setRevealed]=useState(false);
  const [pts,setPts]=useState(0);const [done,setDone]=useState(false);
  function next(p){if(idx+1>=qs.length){setDone(true);onScore(p);}else{setIdx(idx+1);setRevealed(false);}}
  if(done)return(<div style={{textAlign:"center"}}><div style={{fontSize:48}}>{pts>=8?"🧙":"🤔"}</div><div style={{fontFamily:theme.font,color:theme.gold,fontSize:24}}>{pts} poäng!</div></div>);
  return(
    <div>
      <div style={{color:theme.muted,fontSize:13,marginBottom:12}}>Gåta {idx+1}/5 • {pts} poäng</div>
      <div style={{background:theme.card,borderRadius:16,padding:24,fontSize:18,lineHeight:1.6,marginBottom:16,fontStyle:"italic"}}>🤔 {qs[idx].q}</div>
      {!revealed?(<button onClick={()=>setRevealed(true)} style={btnStyle(theme.purple)}>Visa svaret</button>):(
        <>
          <div style={{background:theme.green+"22",border:`2px solid ${theme.green}`,borderRadius:12,padding:16,fontFamily:theme.font,fontSize:22,color:theme.green,textAlign:"center",marginBottom:16}}>💡 {qs[idx].a}</div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{const np=pts+2;setPts(np);next(np);}} style={{...btnStyle(theme.green,false),flex:1}}>✓ Visste det!</button>
            <button onClick={()=>next(pts)} style={{...btnStyle(theme.accent,false),flex:1}}>✗ Visste inte</button>
          </div>
        </>
      )}
    </div>

const drawWords=["katt","hund","bil","hus","träd","sol","båt","fisk","fågel","blomma","glass","pizza","cykel","telefon","stjärna","måne","regnbåge","krabba","drake","robot"];
function DrawingGame({onScore}){
  const canvasRef=useRef(null);
  const [word]=useState(()=>drawWords[Math.floor(Math.random()*drawWords.length)]);
  const [phase,setPhase]=useState("draw");const [guess,setGuess]=useState("");const [result,setResult]=useState(null);
  const [drawing,setDrawing]=useState(false);const [color,setColor]=useState("#e94560");const lastPos=useRef(null);
  function getPos(e,canvas){
    const rect=canvas.getBoundingClientRect();const scaleX=canvas.width/rect.width;const scaleY=canvas.height/rect.height;
    const src=e.touches?e.touches[0]:e;return{x:(src.clientX-rect.left)*scaleX,y:(src.clientY-rect.top)*scaleY};
  }
  function startDraw(e){e.preventDefault();setDrawing(true);lastPos.current=getPos(e,canvasRef.current);}
  function draw(e){
    e.preventDefault();if(!drawing)return;
    const canvas=canvasRef.current;const ctx=canvas.getContext("2d");const pos=getPos(e,canvas);
    ctx.beginPath();ctx.moveTo(lastPos.current.x,lastPos.current.y);ctx.lineTo(pos.x,pos.y);
    ctx.strokeStyle=color;ctx.lineWidth=4;ctx.lineCap="round";ctx.stroke();lastPos.current=pos;
  }
  function stopDraw(){setDrawing(false);}
  function clearCanvas(){canvasRef.current.getContext("2d").clearRect(0,0,400,280);}
  function submitGuess(){const correct=guess.trim().toLowerCase()===word;setResult(correct);onScore(correct?5:1);}
  const colors=["#e94560","#f5a623","#27ae60","#3498db","#9b59b6","#ffffff","#000000"];
  return(
    <div>
      {phase==="draw"?(
        <>
          <div style={{fontSize:14,color:theme.muted,marginBottom:8}}>Rita: <strong style={{color:theme.gold,fontSize:20}}>{word}</strong></div>
          <div style={{display:"flex",gap:6,marginBottom:8}}>
            {colors.map(c=><button key={c} onClick={()=>setColor(c)} style={{width:28,height:28,borderRadius:"50%",background:c,border:`3px solid ${color===c?theme.text:"transparent"}`,cursor:"pointer"}}/>)}
            <button onClick={clearCanvas} style={{marginLeft:"auto",background:"none",border:"1px solid #444",borderRadius:8,color:theme.muted,padding:"4px 8px",cursor:"pointer",fontSize:12}}>Rensa</button>
          </div>
          <canvas ref={canvasRef} width={400} height={280}
            onMouseDown={startDraw} onMouseMove={draw} onMouseUp={stopDraw}
            onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={stopDraw}
            style={{width:"100%",background:"#f8f8f0",borderRadius:16,border:"2px solid #444",display:"block",marginBottom:12}}/>
          <button onClick={()=>setPhase("guess")} style={btnStyle(theme.purple)}>Klar! Gissa nu →</button>
        </>
      ):result===null?(
        <>
          <canvas ref={canvasRef} width={400} height={280} style={{width:"100%",background:"#f8f8f0",borderRadius:16,marginBottom:12,display:"block"}}/>
          <div style={{display:"flex",gap:8}}>
            <input value={guess} onChange={e=>setGuess(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submitGuess()} placeholder="Din gissning..."
              style={{flex:1,background:theme.card,border:"2px solid #444",borderRadius:10,padding:"10px 14px",color:theme.text,fontSize:16}}/>
            <button onClick={submitGuess} style={btnStyle(theme.green,false)}>Gissa!</button>
          </div>
        </>
      ):(
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:48}}>{result?"🎉":"😅"}</div>
          <div style={{fontFamily:theme.font,fontSize:22,color:result?theme.green:theme.accent}}>{result?"Rätt! +5 poäng!":"Fel! Det var: "+word}</div>
        </div>
      )}
    </div>
  );
}

const SW=16,SH=20,SC=18;
function SnakeGame({onScore}){
  const [snake,setSnake]=useState([[8,10],[8,11],[8,12]]);
  const [dir,setDir]=useState([0,-1]);
  const [food,setFood]=useState([4,5]);
  const [running,setRunning]=useState(false);
  const [dead,setDead]=useState(false);
  const [pts,setPts]=useState(0);
  const [scored,setScored]=useState(false);
  const ref=useRef({snake,dir,food,dead,pts});
  useEffect(()=>{ref.current={snake,dir,food,dead,pts};},[snake,dir,food,dead,pts]);
  function randFood(sn){let f;do{f=[Math.floor(Math.random()*SW),Math.floor(Math.random()*SH)];}while(sn.some(([x,y])=>x===f[0]&&y===f[1]));return f;}
  useEffect(()=>{
    if(!running)return;
    const id=setInterval(()=>{
      const{snake:sn,dir:d,food:fo,dead:de,pts:p}=ref.current;
      if(de)return;
      const head=[sn[0][0]+d[0],sn[0][1]+d[1]];
      if(head[0]<0||head[0]>=SW||head[1]<0||head[1]>=SH||sn.some(([x,y])=>x===head[0]&&y===head[1])){
        setDead(true);setRunning(false);if(!ref.current.scored){onScore(p);setScored(true);}return;
      }
      const ate=head[0]===fo[0]&&head[1]===fo[1];
      const newSn=ate?[head,...sn]:[head,...sn.slice(0,-1)];
      const newFood=ate?randFood(newSn):fo;
      setSnake(newSn);setFood(newFood);if(ate)setPts(p2=>p2+1);
    },150);
    return()=>clearInterval(id);
  },[running]);
  function hDir(dx,dy){const{dir:d}=ref.current;if(d[0]===-dx&&d[1]===-dy)return;setDir([dx,dy]);}
  function reset(){const s=[[8,10],[8,11],[8,12]];setSnake(s);setDir([0,-1]);setFood(randFood(s));setDead(false);setPts(0);setRunning(false);setScored(false);}
  const gW=SW*SC,gH=SH*SC;
  return(
    <div style={{textAlign:"center"}}>
      <div style={{fontFamily:theme.font,color:theme.gold,fontSize:18,marginBottom:8}}>🍎 {pts} poäng{dead?" — Game Over!":""}</div>

        <div style={{position:"absolute",left:food[0]*SC,top:food[1]*SC,width:SC,height:SC,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🍎</div>
        {snake.map(([x,y],i)=>(
          <div key={i} style={{position:"absolute",left:x*SC+1,top:y*SC+1,width:SC-2,height:SC-2,borderRadius:i===0?6:3,background:i===0?"#2ecc71":"#27ae60"}}/>
        ))}
        {!running&&!dead&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"#0a162888"}}><div style={{fontFamily:theme.font,color:"#2ecc71",fontSize:20}}>Tryck Start!</div></div>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"60px 60px 60px",gap:4,justifyContent:"center",marginBottom:12}}>
        <div/><button onClick={()=>hDir(0,-1)} style={{height:60,borderRadius:12,background:theme.card,border:"2px solid #2ecc71",color:"#2ecc71",fontSize:24,cursor:"pointer"}}>↑</button><div/>
        <button onClick={()=>hDir(-1,0)} style={{height:60,borderRadius:12,background:theme.card,border:"2px solid #2ecc71",color:"#2ecc71",fontSize:24,cursor:"pointer"}}>←</button>
        <button onClick={()=>hDir(0,1)} style={{height:60,borderRadius:12,background:theme.card,border:"2px solid #2ecc71",color:"#2ecc71",fontSize:24,cursor:"pointer"}}>↓</button>
        <button onClick={()=>hDir(1,0)} style={{height:60,borderRadius:12,background:theme.card,border:"2px solid #2ecc71",color:"#2ecc71",fontSize:24,cursor:"pointer"}}>→</button>

// ===== TETRIS =====
const TW=8,TH=14;
const TETROS=[
  {shape:[[1,1,1,1]],color:"#00f0f0"},
  {shape:[[1,1],[1,1]],color:"#f0f000"},
  {shape:[[0,1,1],[1,1,0]],color:"#00f000"},
  {shape:[[1,1,0],[0,1,1]],color:"#f00000"},
  {shape:[[1,0,0],[1,1,1]],color:"#f0a000"},
  {shape:[[0,0,1],[1,1,1]],color:"#0000f0"},
  {shape:[[0,1,0],[1,1,1]],color:"#a000f0"},
];
function newBoard(){return Array(TH).fill(null).map(()=>Array(TW).fill(0));}
function randPiece(){const t=TETROS[Math.floor(Math.random()*TETROS.length)];return{shape:t.shape,color:t.color,x:Math.floor((TW-t.shape[0].length)/2),y:0};}
function tcollides(board,piece,dx=0,dy=0,shape=piece.shape){
  for(let r=0;r<shape.length;r++)for(let c=0;c<shape[r].length;c++)if(shape[r][c]){
    const nx=piece.x+c+dx,ny=piece.y+r+dy;
    if(nx<0||nx>=TW||ny>=TH||(ny>=0&&board[ny][nx]))return true;
  }
  return false;
}
function trotate(shape){return shape[0].map((_,i)=>shape.map(row=>row[i]).reverse());}
function tmerge(board,piece){
  const b=board.map(r=>[...r]);
  piece.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v){const ny=piece.y+r,nx=piece.x+c;if(ny>=0)b[ny][nx]=piece.color;}}));
  return b;
}
function tclearLines(board){
  const kept=board.filter(r=>r.some(v=>!v));
  const cleared=TH-kept.length;
  return{board:[...Array(cleared).fill(null).map(()=>Array(TW).fill(0)),...kept],lines:cleared};
}
function TetrisGame({onScore}){
  const [board,setBoard]=useState(newBoard());
  const [piece,setPiece]=useState(()=>randPiece());
  const [next,setNext]=useState(()=>randPiece());
  const [running,setRunning]=useState(false);
  const [over,setOver]=useState(false);
  const [pts,setPts]=useState(0);
  const [lines,setLines]=useState(0);
  const ref=useRef({board,piece,next,running,over,pts});
  useEffect(()=>{ref.current={board,piece,next,running,over,pts};},[board,piece,next,running,over,pts]);
  function lock(b,p){
    const nb=tmerge(b,p);const{board:cb,lines:cl}=tclearLines(nb);
    const np=ref.current.next;const nn=randPiece();
    if(tcollides(cb,np)){setBoard(cb);setOver(true);setRunning(false);const total=ref.current.pts+cl*10;setPts(total);onScore(total);}
    else{setBoard(cb);setPiece(np);setNext(nn);setPts(p2=>p2+cl*10);setLines(l=>l+cl);}
  }
  useEffect(()=>{
    if(!running)return;
    const id=setInterval(()=>{
      const{board:b,piece:p,over:o}=ref.current;if(o)return;
      if(!tcollides(b,p,0,1))setPiece(pc=>({...pc,y:pc.y+1}));else lock(b,p);
    },500);
    return()=>clearInterval(id);
  },[running]);
  function move(dx){if(!running)return;const{board:b,piece:p}=ref.current;if(!tcollides(b,p,dx,0))setPiece(pc=>({...pc,x:pc.x+dx}));}
  function drop(){if(!running)return;const{board:b,piece:p}=ref.current;if(!tcollides(b,p,0,1))setPiece(pc=>({...pc,y:pc.y+1}));else lock(b,p);}
  function rot(){if(!running)return;const{board:b,piece:p}=ref.current;const r=trotate(p.shape);if(!tcollides(b,{...p,shape:r}))setPiece(pc=>({...pc,shape:r}));}
  function hardDrop(){if(!running)return;const{board:b,piece:p}=ref.current;let ny=p.y;while(!tcollides(b,p,0,ny-p.y+1))ny++;lock(b,{...p,y:ny});}
  function reset(){setBoard(newBoard());setPiece(randPiece());setNext(randPiece());setOver(false);setPts(0);setLines(0);setRunning(false);}
  const display=board.map(r=>[...r]);
  piece.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v){const ny=piece.y+r,nx=piece.x+c;if(ny>=0&&ny<TH&&nx>=0&&nx<TW)display[ny][nx]=piece.color;}}));
  const C2=28;
  return(
    <div style={{textAlign:"center"}}>
      <div style={{display:"flex",justifyContent:"center",gap:16,marginBottom:8}}>
        <span style={{fontFamily:theme.font,color:theme.purple,fontSize:16}}>⭐ {pts}</span>
        <span style={{fontFamily:theme.font,color:theme.muted,fontSize:16}}>Rader: {lines}</span>
      </div>
      <div style={{display:"flex",gap:12,justifyContent:"center"}}>
        <div style={{border:"2px solid #8e44ad",borderRadius:8,overflow:"hidden",display:"inline-block"}}>
          {display.map((row,r)=>(
            <div key={r} style={{display:"flex"}}>
              {row.map((cell,c)=>(<div key={c} style={{width:C2,height:C2,background:cell||"#0a1628",borderRight:"1px solid #1a1a3a",borderBottom:"1px solid #1a1a3a"}}/>))}
            </div>
          ))}
        </div>
        <div>
          <div style={{fontFamily:theme.font,color:theme.muted,fontSize:12,marginBottom:4}}>Nästa:</div>
          <div style={{background:"#0a1628",border:"1px solid #8e44ad",borderRadius:6,padding:4,display:"inline-block"}}>
            {next.shape.map((row,r)=>(
              <div key={r} style={{display:"flex"}}>
                {row.map((v,c)=><div key={c} style={{width:14,height:14,background:v?next.color:"transparent"}}/>)}
              </div>
            ))}
          </div>
        </div>
      </div>
      <div style={{marginTop:12}}>
        <div style={{display:"grid",gridTemplateColumns:"52px 52px 52px",gap:4,justifyContent:"center",marginBottom:8}}>
          <button onClick={rot} style={{gridColumn:"1/4",height:44,borderRadius:10,background:theme.card,border:"2px solid #8e44ad",color:"#8e44ad",fontSize:18,cursor:"pointer",fontFamily:theme.font}}>↻ Rotera</button>
          <button onClick={()=>move(-1)} style={{height:52,borderRadius:10,background:theme.card,border:"2px solid #8e44ad",color:"#8e44ad",fontSize:24,cursor:"pointer"}}>←</button>
          <button onClick={drop} style={{height:52,borderRadius:10,background:theme.card,border:"2px solid #8e44ad",color:"#8e44ad",fontSize:24,cursor:"pointer"}}>↓</button>
          <button onClick={()=>move(1)} style={{height:52,borderRadius:10,background:theme.card,border:"2px solid #8e44ad",color:"#8e44ad",fontSize:24,cursor:"pointer"}}>→</button>
          <button onClick={hardDrop} style={{gridColumn:"1/4",height:44,borderRadius:10,background:"#8e44ad33",border:"2px solid #8e44ad",color:"#8e44ad",fontSize:14,cursor:"pointer",fontFamily:theme.font}}>⬇ Kasta ner</button>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          {!running&&!over&&<button onClick={()=>setRunning(true)} style={btnStyle("#8e44ad",false)}>▶ Start</button>}
          {running&&<button onClick={()=>setRunning(false)} style={btnStyle(theme.muted,false)}>⏸ Pausa</button>}
          {!running&&pts>0&&!over&&<button onClick={()=>setRunning(true)} style={btnStyle("#8e44ad",false)}>▶ Fortsätt</button>}
          {over&&<button onClick={reset} style={btnStyle(theme.blue,false)}>↺ Igen</button>}
        </div>
        {over&&<div style={{fontFamily:theme.font,color:theme.accent,fontSize:20,marginTop:8}}>Game Over! {pts} poäng</div>}
      </div>
    </div>
  );
}

// ===== VÄGBINGO =====
const BITEMS=[
  {emoji:"🚛",label:"Lastbil"},{emoji:"🐄",label:"Ko"},{emoji:"⛽",label:"Bensinmack"},
  {emoji:"🌾",label:"Åker"},{emoji:"🚜",label:"Traktor"},{emoji:"⛪",label:"Kyrka"},
  {emoji:"🏗️",label:"Bygge"},{emoji:"🌊",label:"Vatten"},{emoji:"🚌",label:"Buss"},
  {emoji:"🌲",label:"Skog"},{emoji:"🏠",label:"Röd stuga"},{emoji:"🐎",label:"Häst"},
  {emoji:"🏍️",label:"Motorcykel"},{emoji:"🌻",label:"Solros"},{emoji:"🦅",label:"Rovfågel"},
  {emoji:"🚑",label:"Ambulans"},{emoji:"⛺",label:"Tält"},{emoji:"🚂",label:"Tåg"},
  {emoji:"🏖️",label:"Strand"},{emoji:"🦊",label:"Räv"},{emoji:"🚓",label:"Polisbil"},
  {emoji:"🌈",label:"Regnbåge"},{emoji:"⚡",label:"Vindkraft"},{emoji:"🐦",label:"Flock fåglar"},
  {emoji:"🎪",label:"Cirkustält"},
];
function BingoGame({onScore}){
  const [grid]=useState(()=>shuffle(BITEMS).slice(0,25));
  const [marked,setMarked]=useState(new Set());
  const [won,setWon]=useState(false);const [scored,setScored]=useState(false);
  function checkBingo(m){
    for(let r=0;r<5;r++){
      if([0,1,2,3,4].every(c=>m.has(r*5+c)))return true;
      if([0,1,2,3,4].every(c=>m.has(c*5+r)))return true;
    }
    return[0,6,12,18,24].every(i=>m.has(i))||[4,8,12,16,20].every(i=>m.has(i));
  }
  function tap(i){
    if(won)return;
    const nm=new Set(marked);if(nm.has(i))nm.delete(i);else nm.add(i);
    setMarked(nm);
    if(checkBingo(nm)&&!scored){setWon(true);setScored(true);onScore(nm.size);}
  }
  function isWinCell(i){
    const m=marked;
    for(let r=0;r<5;r++){
      if([0,1,2,3,4].every(c=>m.has(r*5+c))&&Math.floor(i/5)===r)return true;
      if([0,1,2,3,4].every(c=>m.has(c*5+r))&&i%5===r)return true;
    }
    return([0,6,12,18,24].every(j=>m.has(j))&&[0,6,12,18,24].includes(i))||([4,8,12,16,20].every(j=>m.has(j))&&[4,8,12,16,20].includes(i));
  }
  return(
    <div>

              {isM&&<span style={{fontSize:10}}>✓</span>}
            </button>

const ABLY_KEY = "noXoUQ.ljS0og:Qm3q8XMKwuSJL1KQ1tw7tiNf-GP7jynZgKmMD9QP0SM";
const CHANNEL_NAME = "bilresa-walkie";

function encodeWAV(samples, sampleRate) {
  const buffer = new ArrayBuffer(44 + samples.length * 2);
  const view = new DataView(buffer);
  function writeStr(o,s){for(let i=0;i<s.length;i++)view.setUint8(o+i,s.charCodeAt(i));}
  writeStr(0,"RIFF"); view.setUint32(4,36+samples.length*2,true);
  writeStr(8,"WAVE"); writeStr(12,"fmt ");
  view.setUint32(16,16,true); view.setUint16(20,1,true); view.setUint16(22,1,true);
  view.setUint32(24,sampleRate,true); view.setUint32(28,sampleRate*2,true);
  view.setUint16(32,2,true); view.setUint16(34,16,true);
  writeStr(36,"data"); view.setUint32(40,samples.length*2,true);
  let off=44;
  for(let i=0;i<samples.length;i++){
    const s=Math.max(-1,Math.min(1,samples[i]));
    view.setInt16(off,s<0?s*0x8000:s*0x7FFF,true); off+=2;
  }
  return new Blob([buffer],{type:"audio/wav"});
}

// Max safe b64 payload = floor(65000 * 3/4) bytes of binary
const MAX_CHUNK_BYTES = Math.floor(65000 * 0.74);

function WalkieTalkieScreen({playerName, onBack}) {
  const [status, setStatus] = useState("idle");
  const [messages, setMessages] = useState([]);
  const [error, setError] = useState("");
  const [debugLog, setDebugLog] = useState([]);
  const [onlineUsers, setOnlineUsers] = useState([]);
  const [target, setTarget] = useState("alla");
  const [recSeconds, setRecSeconds] = useState(0);
  const ablyCh = useRef(null);
  const ablyClient = useRef(null);
  const timerRef = useRef(null);
  const audioCtxRef = useRef(null);
  const processorRef = useRef(null);
  const streamRef = useRef(null);
  const samplesRef = useRef([]);
  const statusRef = useRef("idle");
  const playerRef = useRef(null);      // persistent <audio> element, unlocked on first tap
  const audioUnlocked = useRef(false);
  const playQueue = useRef([]);

  // Unlock audio on first user interaction — required for iOS autoplay
  function unlockAudio(){
    if(audioUnlocked.current) return;
    if(!playerRef.current){
      playerRef.current = new Audio();
      playerRef.current.playsInline = true;
    }
    // Play a tiny silent WAV to unlock
    playerRef.current.src = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA=";
    playerRef.current.play().then(()=>{
      audioUnlocked.current = true;
      log("Ljud upplåst — autouppspelning aktiv!");
    }).catch(()=>{});
  }

  function playIncoming(url){
    if(!playerRef.current){
      playerRef.current = new Audio();
      playerRef.current.playsInline = true;
    }
    const p = playerRef.current;
    if(!p.paused){
      // Queue if something is playing
      playQueue.current.push(url);
      return;
    }
    p.src = url;
    p.onended = () => {
      if(playQueue.current.length > 0){
        const next = playQueue.current.shift();
        p.src = next;
        p.play().catch(()=>{});
      }
    };
    p.play().catch(e => log("Autoplay blockerad — tryck 🎙️ en gång först"));
  }
  // Buffer incoming chunks: msgId -> {total, parts: {}}
  const incomingRef = useRef({});

  function log(msg) {
    console.log("[WT]", msg);
    setDebugLog(d => [...d.slice(-6), new Date().toLocaleTimeString("sv") + " " + msg]);
  }

  function setStatusBoth(s) { statusRef.current = s; setStatus(s); }

  useEffect(() => {
    async function connect() {
      try {
        log("Ansluter...");
        setStatusBoth("connecting");
        const client = new Ably.Realtime({ key: ABLY_KEY, clientId: playerName });
        ablyClient.current = client;
        await new Promise((res, rej) => {
          client.connection.on("connected", res);
          client.connection.on("failed", rej);
        });
        const ch = client.channels.get(CHANNEL_NAME);
        ablyCh.current = ch;

        await ch.subscribe("voice", (msg) => {
          const { from, to, msgId, part, total, audioB64 } = msg.data;
          if (from === playerName) return;
          if (to !== "alla" && to !== playerName) return;

          // Assemble chunks
          if (!incomingRef.current[msgId]) incomingRef.current[msgId] = { total, parts: {} };
          incomingRef.current[msgId].parts[part] = audioB64;
          const assembled = incomingRef.current[msgId];
          const gotParts = Object.keys(assembled.parts).length;
          log(`Del ${part+1}/${total} från ${from}`);

          if (gotParts === assembled.total) {
            delete incomingRef.current[msgId];
            // Decode each chunk to bytes separately, then concatenate
            try {
              const allBytes = [];
              // Sort parts by index to guarantee correct order
              const sortedParts = Object.keys(assembled.parts)
                .map(Number).sort((a,b)=>a-b);
              for (const p of sortedParts) {
                const b64 = assembled.parts[p];
                // Validate b64 string
                const clean = b64.replace(/[^A-Za-z0-9+/=]/g, "");
                try {
                  const binary = atob(clean);
                  for (let j=0;j<binary.length;j++) allBytes.push(binary.charCodeAt(j));
                } catch(decErr) {
                  log("Del " + p + " avkodningsfel: " + decErr.message);
                }
              }
              const bytes = new Uint8Array(allBytes);
              const blob = new Blob([bytes],{type:"audio/wav"});
              const url = URL.createObjectURL(blob);
              const label = to === "alla" ? "→ Alla" : "→ dig";
              setMessages(m=>[...m.slice(-19),{from,url,id:Date.now(),label}]);
              log("Spelar upp från " + from);
              playIncoming(url);
            } catch(ex) { log("Avkodningsfel: "+ex.message); }
          }
        });

        await ch.presence.enter({ name: playerName });
        const present = await ch.presence.get();
        setOnlineUsers(present.map(p=>p.clientId).filter(u=>u!==playerName));
        ch.presence.subscribe(()=>{
          ch.presence.get().then(p=>setOnlineUsers(p.map(x=>x.clientId).filter(u=>u!==playerName)));
        });
        setStatusBoth("ready");
        log("Redo!");
      } catch(e) {
        log("Fel: "+e.message);
        setError("Anslutningsfel: "+e.message);
        setStatusBoth("idle");
      }
    }
    connect();
    return () => {
      clearInterval(timerRef.current);
      stopCapture();
      try { ablyCh.current && ablyCh.current.presence.leave(); } catch(e){}
      try { ablyClient.current && ablyClient.current.close(); } catch(e){}
    };
  }, []);

  function stopCapture() {
    try { processorRef.current && processorRef.current.disconnect(); } catch(e){}
    try { audioCtxRef.current && audioCtxRef.current.close(); } catch(e){}
    try { streamRef.current && streamRef.current.getTracks().forEach(t=>t.stop()); } catch(e){}
    processorRef.current=null; audioCtxRef.current=null; streamRef.current=null;
  }

  function toggleRecording() {
    unlockAudio();
    log("Toggle, status=" + statusRef.current);
    if (statusRef.current === "recording") stopRecording();
    else if (statusRef.current === "ready") startRecording();
  }

  async function startRecording() {
    log("Startar...");
    setError(""); setRecSeconds(0);
    samplesRef.current = [];
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        audio:{ channelCount:1, echoCancellation:true, noiseSuppression:true }
      });
      streamRef.current = stream;
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      audioCtxRef.current = ctx;
      log("AudioCtx sampleRate=" + ctx.sampleRate);
      const source = ctx.createMediaStreamSource(stream);
      const processor = ctx.createScriptProcessor(4096,1,1);
      processorRef.current = processor;
      const ratio = Math.max(1, Math.round(ctx.sampleRate / 8000));
      processor.onaudioprocess = (e) => {
        const data = e.inputBuffer.getChannelData(0);
        for (let i=0;i<data.length;i+=ratio) samplesRef.current.push(data[i]);
      };
      source.connect(processor);
      processor.connect(ctx.destination);
      setStatusBoth("recording");
      let secs=0;
      timerRef.current = setInterval(()=>{
        secs++; setRecSeconds(secs);
        if(secs>=60){ log("Auto-stopp 60s"); stopRecording(); }
      },1000);
      log("Inspelning igång!");
    } catch(ex) {
      log("Mikrofonfel: "+ex.message);
      setError("Mikrofonfel: "+ex.message);
    }
  }

  async function stopRecording() {
    log("Stoppar, samples=" + samplesRef.current.length);
    clearInterval(timerRef.current);
    setStatusBoth("ready");
    stopCapture();
    const samples = samplesRef.current;
    if (samples.length < 800) { setError("För kort! Tala och tryck ⏹️ för att skicka."); return; }

    const blob = encodeWAV(new Float32Array(samples), 8000);
    log("WAV=" + blob.size + " bytes, MAX_CHUNK=" + MAX_CHUNK_BYTES);

    // Convert full WAV to ArrayBuffer, split into chunks
    const arrayBuf = await blob.arrayBuffer();
    const bytes = new Uint8Array(arrayBuf);

    // Split into chunks of MAX_CHUNK_BYTES bytes
    const chunks = [];
    for (let i=0; i<bytes.length; i+=MAX_CHUNK_BYTES) {
      chunks.push(bytes.slice(i, i+MAX_CHUNK_BYTES));
    }
    log("Delar upp i " + chunks.length + " delar");

    const msgId = Date.now() + "_" + Math.random().toString(36).slice(2,7);
    try {
      for (let i=0; i<chunks.length; i++) {
        // Convert chunk to base64
        let binary = "";
        chunks[i].forEach(b => binary += String.fromCharCode(b));
        const b64 = btoa(binary);
        log(`Skickar del ${i+1}/${chunks.length} (${b64.length} b64-tecken)`);
        await ablyCh.current.publish("voice", {
          from: playerName, to: target,
          msgId, part: i, total: chunks.length,
          audioB64: b64
        });
      }
      log("Allt skickat!");
    } catch(err) {
      log("Sändfel: "+err.message);
      setError("Sändfel: "+err.message);
    }
  }

  const isRecording = status === "recording";
  const isReady = status === "ready";

  return (
    <div style={{maxWidth:480,margin:"0 auto",padding:16}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
        <button onClick={onBack} style={{background:"none",border:"2px solid #8892b0",borderRadius:10,color:"#8892b0",padding:"6px 12px",cursor:"pointer"}}>← Hem</button>
        <h2 style={{fontFamily:"'Fredoka One',cursive",color:"#f5a623",margin:0,fontSize:22}}>📻 Walkie-Talkie</h2>
      </div>

      <div style={{background:"#16213e",borderRadius:16,padding:14,marginBottom:14,textAlign:"center"}}>
        <div style={{fontSize:12,color:"#8892b0",marginBottom:4}}>
          {status==="connecting"?"🔄 Ansluter...":isReady||isRecording?"🟢 Ansluten":"⚫ Frånkopplad"}
        </div>
        <div style={{fontFamily:"'Fredoka One',cursive",color:"#eaeaea",fontSize:15}}>👤 {playerName}</div>
        {onlineUsers.length>0&&(
          <div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"}}>
            {onlineUsers.map(u=>(
              <span key={u} style={{background:"#3498db33",border:"1px solid #3498db",borderRadius:20,padding:"2px 10px",fontSize:12,color:"#eaeaea"}}>🚗 {u}</span>
            ))}
          </div>
        )}
        {onlineUsers.length===0&&isReady&&<div style={{color:"#8892b0",fontSize:12,marginTop:4}}>Väntar på andra bilar...</div>}
      </div>

      {onlineUsers.length>0&&(
        <div style={{marginBottom:14}}>
          <div style={{fontFamily:"'Fredoka One',cursive",color:"#8892b0",fontSize:13,marginBottom:6}}>Skicka till:</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button onClick={()=>setTarget("alla")} style={{padding:"8px 16px",borderRadius:20,border:`2px solid ${target==="alla"?"#f5a623":"#444"}`,background:target==="alla"?"#f5a62333":"#16213e",color:target==="alla"?"#f5a623":"#8892b0",fontFamily:"'Fredoka One',cursive",fontSize:14,cursor:"pointer"}}>📢 Alla</button>
            {onlineUsers.map(u=>(
              <button key={u} onClick={()=>setTarget(u)} style={{padding:"8px 16px",borderRadius:20,border:`2px solid ${target===u?"#3498db":"#444"}`,background:target===u?"#3498db33":"#16213e",color:target===u?"#3498db":"#8892b0",fontFamily:"'Fredoka One',cursive",fontSize:14,cursor:"pointer"}}>🚗 {u}</button>
            ))}
          </div>
        </div>
      )}

      {error&&<div style={{background:"#e9456022",border:"2px solid #e94560",borderRadius:12,padding:10,color:"#e94560",fontSize:14,marginBottom:14}}>⚠️ {error}</div>}

      <div style={{textAlign:"center",marginBottom:16}}>
        <button
          onClick={toggleRecording}
          disabled={!isReady&&!isRecording}
          style={{
            width:170,height:170,borderRadius:"50%",
            background:isRecording?"#e94560":isReady?"#27ae60":"#444",
            border:`7px solid ${isRecording?"#ff6b85":isReady?"#2ecc71":"#666"}`,
            fontSize:60,boxShadow:isRecording?"0 0 60px #e9456088":"none",
            transition:"background 0.15s",display:"flex",alignItems:"center",
            justifyContent:"center",margin:"0 auto",
            cursor:isReady||isRecording?"pointer":"default",
          }}
        >{isRecording?"⏹️":"🎙️"}</button>
        <div style={{fontFamily:"'Fredoka One',cursive",fontSize:18,marginTop:14,
          color:isRecording?"#e94560":isReady?"#27ae60":"#8892b0"}}>
          {isRecording?`● SÄNDER... ${recSeconds}s`:isReady?"TRYCK för att tala":status==="connecting"?"Ansluter...":"Frånkopplad"}
        </div>
        {isReady&&!isRecording&&<div style={{color:"#8892b0",fontSize:13,marginTop:4}}>Till: <strong style={{color:"#f5a623"}}>{target==="alla"?"Alla bilar":target}</strong> • max 60 sek</div>}
      </div>

      <div style={{background:"#0d1117",borderRadius:12,padding:10,marginBottom:14,fontFamily:"monospace",fontSize:11,color:"#27ae60"}}>
        {debugLog.length===0?<span style={{color:"#444"}}>Logg...</span>:debugLog.map((l,i)=><div key={i}>{l}</div>)}
      </div>

      {messages.length>0&&(
        <div style={{background:"#16213e",borderRadius:16,padding:12}}>
          <div style={{fontFamily:"'Fredoka One',cursive",color:"#8892b0",fontSize:13,marginBottom:8}}>📨 Mottagna:</div>
          {[...messages].reverse().map(msg=>(
            <div key={msg.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #2a2a4a"}}>
              <span style={{fontSize:20}}>🚗</span>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Fredoka One',cursive",color:"#3498db",fontSize:14}}>{msg.from} <span style={{color:"#8892b0",fontSize:11}}>{msg.label}</span></div>
                <audio controls src={msg.url} style={{width:"100%",height:36,marginTop:4}}/>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
